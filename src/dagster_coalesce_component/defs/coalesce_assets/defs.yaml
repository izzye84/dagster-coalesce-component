type: dagster_coalesce_component.components.coalesce_start_a_run.CoalesceStartARun

requirements:
  env:
    - COALESCE_BEARER_TOKEN
    - COALESCE_ENVIRONMENT_ID
    - SNOWFLAKE_USERNAME
    - SNOWFLAKE_PASSWORD
    - SNOWFLAKE_WAREHOUSE
    - SNOWFLAKE_ROLE

attributes:
  # Dagster Asset Configuration
  asset_key: "fct_order_refresh"
  group_name: "coalesce"

  # Coalesce API Configuration
  base_url: "app.coalescesoftware.io"
  bearer_token: "{{ env.COALESCE_BEARER_TOKEN }}"
  environment_id: "{{ env.COALESCE_ENVIRONMENT_ID }}"

  # Snowflake Credentials
  snowflake_username: "{{ env.SNOWFLAKE_USERNAME }}"
  snowflake_password: "{{ env.SNOWFLAKE_PASSWORD }}"
  snowflake_warehouse: "{{ env.SNOWFLAKE_WAREHOUSE }}"
  snowflake_role: "{{ env.SNOWFLAKE_ROLE }}"

  # Coalesce Run Configuration
  # Run the fact table and all its upstream dependencies using + selector
  include_nodes_selector: "+{name:FCT_ORDERS}"

  # Optional: Exclude specific nodes
  # exclude_nodes_selector: "{name:TEST_TABLE}"

  # Optional: Run a specific Coalesce job
  # job_id: "your-job-id"

  # Optional: Maximum parallel nodes (default: 16)
  # parallelism: 16

  # Polling Configuration
  poll_interval_sec: 10
  max_wait_time_sec: 3600

  # Optional: Define upstream dependencies from other Dagster assets
  # Example: Wait for Fivetran ingestion before running Coalesce
  # deps:
  #   - ["fivetran_raw", "users"]
  #   - ["fivetran_raw", "orders"]
